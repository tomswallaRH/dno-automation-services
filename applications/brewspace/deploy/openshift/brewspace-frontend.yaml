apiVersion: apps/v1
kind: Deployment
metadata:
  name: brewspace-frontend
  labels:
    app.kubernetes.io/name: brewspace-frontend
    app.kubernetes.io/part-of: brewspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: brewspace-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: brewspace-frontend
        app.kubernetes.io/part-of: brewspace
    spec:
      containers:
        - name: nginx
          image: brewspace-frontend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: brewspace-frontend
  labels:
    app.kubernetes.io/name: brewspace-frontend
    app.kubernetes.io/part-of: brewspace
spec:
  selector:
    app.kubernetes.io/name: brewspace-frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
